<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1E1035" />
    </linearGradient>

    <!-- Card Border Neon Glow -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6AD3F7" />
      <stop offset="50%" stop-color="#FF6C37" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      /* --- FONTS --- */
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&amp;display=swap');
      text {
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        fill: #E5E7EB;
      }

      /* --- ANIMATIONS --- */
      @keyframes twinkle {
        0%, 100% { opacity: 0.1; transform: scale(0.8) rotate(0deg); }
        50% { opacity: 1; transform: scale(1.3) rotate(180deg); }
      }

      @keyframes pulse-glow {
        0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 2px rgba(168, 85, 247, 0.4)); }
        50% { opacity: 1; filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.8)); }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes neon-flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
          filter: drop-shadow(0 0 4px #6AD3F7) drop-shadow(0 0 12px #6AD3F7);
        }
        20%, 24%, 55% {
          filter: none;
        }
      }

      /* --- STYLING CLASSES --- */
      .star {
        animation: twinkle 3s infinite ease-in-out;
        transform-origin: center;
        fill: #FDE047;
      }
      .neon-text {
        animation: neon-flicker 6s infinite alternate;
        fill: #6AD3F7;
        font-weight: bold;
      }
      .code-line {
        opacity: 0;
        animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .keyword { fill: #F92672; font-weight: bold; }
      .property { fill: #A6E22E; }
      .string { fill: #E6DB74; }
      .number { fill: #AE81FF; }
      .comment { fill: #75715E; font-style: italic; }
      .bracket { fill: #FD971F; }

      /* --- STAGGERED LINE ANIMATION TIME --- */
      .l1 { animation-delay: 0.1s; }
      .l2 { animation-delay: 0.3s; }
      .l3 { animation-delay: 0.5s; }
      .l4 { animation-delay: 0.7s; }
      .l5 { animation-delay: 0.9s; }
      .l6 { animation-delay: 1.1s; }
      .l7 { animation-delay: 1.3s; }
      .l8 { animation-delay: 1.5s; }
      .l9 { animation-delay: 1.7s; }
      .l10 { animation-delay: 1.9s; }
      .l11 { animation-delay: 2.1s; }
      .l12 { animation-delay: 2.3s; }
      .l13 { animation-delay: 2.5s; }
      .l14 { animation-delay: 2.7s; }
      .l15 { animation-delay: 2.9s; }
    </style>
  </defs>

  <!-- Background Card -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="2.5" />

  <!-- Twinkling Sparkles / Glitters -->
  <!-- Star 1 -->
  <path class="star" style="animation-delay: 0.2s;" d="M120,40 L123,47 L130,50 L123,53 L120,60 L117,53 L110,50 L117,47 Z" />
  <!-- Star 2 -->
  <path class="star" style="animation-delay: 0.8s;" d="M680,80 L682,84 L687,86 L682,88 L680,92 L678,88 L673,86 L678,84 Z" />
  <!-- Star 3 -->
  <path class="star" style="animation-delay: 1.4s;" d="M720,320 L722,324 L727,326 L722,328 L720,332 L718,328 L713,326 L718,324 Z" />
  <!-- Star 4 -->
  <path class="star" style="animation-delay: 2.0s;" d="M80,380 L82,384 L87,386 L82,388 L80,392 L78,388 L73,386 L78,384 Z" />
  <!-- Small Stars -->
  <circle class="star" style="animation-delay: 0.5s;" cx="250" cy="60" r="2.5" />
  <circle class="star" style="animation-delay: 1.1s;" cx="540" cy="30" r="2" />
  <circle class="star" style="animation-delay: 1.7s;" cx="620" cy="400" r="3" />
  <circle class="star" style="animation-delay: 2.3s;" cx="140" cy="280" r="1.5" />

  <!-- Mac Window Chrome UI Controls -->
  <g transform="translate(25, 20)">
    <circle cx="0" cy="0" r="6" fill="#FF5F56" />
    <circle cx="20" cy="0" r="6" fill="#FFBD2E" />
    <circle cx="40" cy="0" r="6" fill="#27C93F" />
    <text x="75" y="5" font-size="12" fill="#9CA3AF" font-weight="bold">developer.ts</text>
  </g>

  <!-- Glowing Icon Badge in the corner -->
  <g transform="translate(730, 20)">
    <circle cx="10" cy="10" r="18" fill="#1E1B4B" stroke="#6AD3F7" stroke-width="1.5" style="animation: pulse-glow 2s infinite ease-in-out;" />
    <path d="M4,10 L8,6 L12,10 L10,10 L10,14 L6,14 L6,10 Z" fill="#6AD3F7" transform="translate(5, 5) scale(0.8)" />
  </g>

  <!-- Interactive Code Lines -->
  <g transform="translate(40, 75)">
    <!-- Line 1 -->
    <text class="code-line l1" x="0" y="20">
      <tspan class="keyword">const</tspan> <tspan class="neon-text">jashwanth</tspan> = <tspan class="bracket">{</tspan>
    </text>

    <!-- Line 2 -->
    <text class="code-line l2" x="0" y="45">
      <tspan fill="#9CA3AF">  role:</tspan> <tspan class="string">"Backend Developer"</tspan>,
    </text>

    <!-- Line 3 -->
    <text class="code-line l3" x="0" y="70">
      <tspan fill="#9CA3AF">  college:</tspan> <tspan class="string">"IIIT Jabalpur (CSE)"</tspan>,
    </text>

    <!-- Line 4 -->
    <text class="code-line l4" x="0" y="95">
      <tspan class="property">  currentlyBuilding</tspan>: <tspan class="bracket">[</tspan>
    </text>

    <!-- Line 5 -->
    <text class="code-line l5" x="0" y="120">
      <tspan class="string">    "🧱 Formula Builder — AI-powered Form Engine"</tspan>,
    </text>

    <!-- Line 6 -->
    <text class="code-line l6" x="0" y="145">
      <tspan class="string">    "🚛 Smart Truck — Last-mile Logistics Optimizer"</tspan>
    </text>

    <!-- Line 7 -->
    <text class="code-line l7" x="0" y="170">
      <tspan class="bracket">  ]</tspan>,
    </text>

    <!-- Line 8 -->
    <text class="code-line l8" x="0" y="195">
      <tspan class="property">  techStack</tspan>: <tspan class="bracket">{</tspan>
    </text>

    <!-- Line 9 -->
    <text class="code-line l9" x="0" y="220">
      <tspan fill="#9CA3AF">    languages:</tspan> <tspan class="bracket">[</tspan><tspan class="string">"JS"</tspan>, <tspan class="string">"TS"</tspan>, <tspan class="string">"C++"</tspan><tspan class="bracket">]</tspan>,
    </text>

    <!-- Line 10 -->
    <text class="code-line l10" x="0" y="245">
      <tspan fill="#9CA3AF">    backend:</tspan> <tspan class="bracket">[</tspan><tspan class="string">"Node"</tspan>, <tspan class="string">"Express"</tspan>, <tspan class="string">"PostgreSQL"</tspan><tspan class="bracket">]</tspan>,
    </text>

    <!-- Line 11 -->
    <text class="code-line l11" x="0" y="270">
      <tspan fill="#9CA3AF">    messaging:</tspan> <tspan class="bracket">[</tspan><tspan class="string">"RabbitMQ"</tspan>, <tspan class="string">"Redis"</tspan><tspan class="bracket">]</tspan>
    </text>

    <!-- Line 12 -->
    <text class="code-line l12" x="0" y="295">
      <tspan class="bracket">  }</tspan>,
    </text>

    <!-- Line 13 -->
    <text class="code-line l13" x="0" y="320">
      <tspan class="property">  achievements</tspan>: <tspan class="bracket">{</tspan>
    </text>

    <!-- Line 14 -->
    <text class="code-line l14" x="0" y="345">
      <tspan fill="#9CA3AF">    leetcode:</tspan> <tspan class="number">1833</tspan> <tspan class="comment">// Top 2% (Weekly 482)</tspan>
    </text>

    <!-- Line 15 -->
    <text class="code-line l15" x="0" y="370">
      <tspan class="bracket">  }</tspan>
    </text>

    <!-- Close brackets -->
    <text class="code-line" style="animation-delay: 3.1s;" x="0" y="395">
      <tspan class="bracket">};</tspan>
    </text>
  </g>
</svg>
