    <!-- "🧱 Formula Builder..." -->
    <text class="code-line l7" x="85" y="162">
      <tspan class="string">"🧱 Formula Builder — Full-stack form engine with AI spam detection"</tspan>,
    </text>

    <!-- "🚛 Smart Truck..." -->
    <text class="code-line l8" x="85" y="184">
      <tspan class="string">"🚛 Smart Truck — K-means clustering for last-mile logistics"</tspan>,
    </text>

    <!-- "📦 Bhandara App..." -->
    <text class="code-line l9" x="85" y="206">
