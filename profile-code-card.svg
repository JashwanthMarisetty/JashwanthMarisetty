<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1290" width="100%" height="100%">
  <defs>
    <!-- Dark Gritty Volcanic Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070403" />
      <stop offset="50%" stop-color="#0E0704" />
      <stop offset="100%" stop-color="#1A0A02" />
    </linearGradient>

    <!-- KGF Molten Gold & Fire Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4500" /> <!-- Lava Red-Orange -->
      <stop offset="50%" stop-color="#FFD700" /> <!-- Gold -->
      <stop offset="100%" stop-color="#8B4513" /> <!-- Charcoal Bronze -->
    </linearGradient>

    <!-- Highly Optimized Glow Filter for tiny sparks only (prevents lag) -->
    <filter id="spark-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style type="text/css">
      <![CDATA[
      /* --- FONTS & STYLES --- */
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&display=swap');
      text {
        font-family: 'Fira Code', monospace;
        font-size: 13.5px;
        fill: #E5E7EB;
      }

      /* --- THERMAL DRAFT PARTICLE PHYSICS (60FPS GPU DRIVEN RELATIVE OFFSETS) --- */
      @keyframes draft-wavy-left {
        0% {
          transform: translateY(0) translateX(0) scale(1);
          opacity: 0;
          fill: #FFFFFF;
        }
        10% {
          opacity: 1;
          fill: #FFF4A3;
        }
        50% {
          transform: translateY(-550px) translateX(-40px) scale(0.85);
          fill: #FF5E00;
        }
        85% {
          opacity: 0.7;
          fill: #FF3C00;
        }
        100% {
          transform: translateY(-1100px) translateX(-70px) scale(0.3);
          opacity: 0;
          fill: #3E0C06;
        }
      }

      @keyframes draft-wavy-right {
        0% {
          transform: translateY(0) translateX(0) scale(0.9);
          opacity: 0;
          fill: #FFEAA7;
        }
        15% {
          opacity: 1;
          fill: #FFAE00;
        }
        60% {
          transform: translateY(-500px) translateX(45px) scale(0.7);
          fill: #E63B00;
        }
        85% {
          opacity: 0.6;
          fill: #8B0000;
        }
        100% {
          transform: translateY(-1100px) translateX(80px) scale(0.2);
          opacity: 0;
          fill: #210200;
        }
      }

      @keyframes active-cursor {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }

      @keyframes code-fade {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes gold-glint {
        0%, 100% { fill: #FFD700; opacity: 0.8; }
        50% { fill: #FF8C00; opacity: 1; }
      }

      /* --- CLASS BINDINGS --- */
      .spark-left {
        transform-origin: center;
        filter: url(#spark-glow);
        will-change: transform, opacity;
      }
      .spark-right {
        transform-origin: center;
        filter: url(#spark-glow);
        will-change: transform, opacity;
      }
      .s1 { animation: draft-wavy-left 9s infinite linear; animation-delay: 0s; }
      .s2 { animation: draft-wavy-right 11s infinite linear; animation-delay: 1.5s; }
      .s3 { animation: draft-wavy-left 8s infinite linear; animation-delay: 3s; }
      .s4 { animation: draft-wavy-right 10s infinite linear; animation-delay: 4.5s; }
      .s5 { animation: draft-wavy-left 9s infinite linear; animation-delay: 6s; }
      .s6 { animation: draft-wavy-right 8s infinite linear; animation-delay: 7.5s; }
      .s7 { animation: draft-wavy-left 9s infinite linear; animation-delay: 2.2s; }
      .s8 { animation: draft-wavy-right 10s infinite linear; animation-delay: 5.3s; }

      .live-cursor {
        animation: active-cursor 1s infinite steps(2, start);
        fill: #FF5F1F;
        font-weight: bold;
      }
      .code-line {
        opacity: 0;
        animation: code-fade 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .glint-text {
        animation: gold-glint 4s infinite alternate;
        fill: #FFD700;
        font-weight: bold;
      }

      /* --- KGF CINEMATIC PALETTE --- */
      .keyword { fill: #FF5F1F; font-weight: bold; } /* Magma Orange */
      .variable { fill: #FFD700; font-weight: bold; } /* Shiny Gold */
      .property { fill: #F59E0B; } /* Molten Amber */
      .string { fill: #FBBF24; } /* Soft Gold string */
      .number { fill: #FF9F1C; }
      .bracket { fill: #EF4444; } /* Red outline */
      .comment { fill: #8B7D77; font-style: italic; } /* Volcanic Charcoal Ash */
      ]]>
    </style>
  </defs>

  <!-- Solid Canvas Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" />

  <!-- Volcanic Terminal Window Glass Panel -->
  <rect x="3" y="3" width="844" height="1284" rx="16" fill="none" stroke="url(#border-grad)" stroke-width="2.5" />
  <rect x="5" y="5" width="840" height="1280" rx="16" fill="rgba(9, 6, 5, 0.92)" />

  <!-- IDE Window Chrome Header -->
  <g transform="translate(25, 20)">
    <circle cx="0" cy="0" r="6" fill="#4B1808" /> 
    <circle cx="20" cy="0" r="6" fill="#B25E00" />
    <circle cx="40" cy="0" r="6" fill="#D97706" />
    <text x="75" y="5" font-size="12" fill="#8B7D77" font-weight="bold">developer.ts</text>
  </g>

  <!-- Complete Javascript Object with Tab x-Coordinates -->
  <g transform="translate(20, 60)">
    <!-- const jashwanth = { -->
    <text class="code-line l1" x="25" y="30">
      <tspan class="keyword">const</tspan> <tspan class="glint-text">jashwanth</tspan> = <tspan class="bracket">{</tspan>
    </text>

    <!-- name: "Marisetty Jashwanth", -->
    <text class="code-line l2" x="55" y="52">
      <tspan fill="#8B7D77">name:</tspan> <tspan class="string">"Marisetty Jashwanth"</tspan>,
    </text>

    <!-- college: "IIIT Jabalpur — B.Tech CSE (2022–Present)", -->
    <text class="code-line l3" x="55" y="74">
      <tspan fill="#8B7D77">college:</tspan> <tspan class="string">"IIIT Jabalpur — B.Tech CSE (2022–Present)"</tspan>,
    </text>

    <!-- role: "Backend Developer", -->
    <text class="code-line l4" x="55" y="96">
      <tspan fill="#8B7D77">role:</tspan> <tspan class="string">"Backend Developer"</tspan>,
    </text>

    <!-- location: "Jabalpur, India 🇮🇳", -->
    <text class="code-line l5" x="55" y="118">
      <tspan fill="#8B7D77">location:</tspan> <tspan class="string">"Jabalpur, India 🇮🇳"</tspan>,
    </text>

    <!-- currentlyBuilding: [ -->
    <text class="code-line l6" x="55" y="140">
      <tspan class="property">currentlyBuilding</tspan>: <tspan class="bracket">[</tspan>
