<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1290" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1E1035" />
    </linearGradient>

    <!-- Card Border Neon Glow -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6AD3F7" />
      <stop offset="50%" stop-color="#FF6C37" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      /* --- FONTS --- */
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&amp;display=swap');
      text {
        font-family: 'Fira Code', monospace;
        font-size: 13.5px;
        fill: #E5E7EB;
      }

      /* --- ANIMATIONS --- */
      @keyframes twinkle {
        0%, 100% { opacity: 0.1; transform: scale(0.8) rotate(0deg); }
        50% { opacity: 1; transform: scale(1.3) rotate(180deg); }
      }

      @keyframes pulse-glow {
        0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 2px rgba(168, 85, 247, 0.4)); }
        50% { opacity: 1; filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.8)); }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes neon-flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
          filter: drop-shadow(0 0 4px #6AD3F7) drop-shadow(0 0 12px #6AD3F7);
        }
        20%, 24%, 55% {
          filter: none;
        }
      }

      /* --- STYLING CLASSES --- */
      .star {
        animation: twinkle 3s infinite ease-in-out;
        transform-origin: center;
        fill: #FDE047;
      }
      .neon-text {
        animation: neon-flicker 6s infinite alternate;
        fill: #6AD3F7;
        font-weight: bold;
      }
      .code-line {
        opacity: 0;
        animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .keyword { fill: #F92672; font-weight: bold; }
      .property { fill: #A6E22E; }
      .string { fill: #E6DB74; }
      .number { fill: #AE81FF; }
      .comment { fill: #75715E; font-style: italic; }
      .bracket { fill: #FD971F; }

      /* --- STAGGERED LINE ANIMATION TIME --- */
      .l1 { animation-delay: 0.05s; }
      .l2 { animation-delay: 0.10s; }
      .l3 { animation-delay: 0.15s; }
      .l4 { animation-delay: 0.20s; }
      .l5 { animation-delay: 0.25s; }
      .l6 { animation-delay: 0.30s; }
      .l7 { animation-delay: 0.35s; }
      .l8 { animation-delay: 0.40s; }
      .l9 { animation-delay: 0.45s; }
      .l10 { animation-delay: 0.50s; }
      .l11 { animation-delay: 0.55s; }
      .l12 { animation-delay: 0.60s; }
      .l13 { animation-delay: 0.65s; }
      .l14 { animation-delay: 0.70s; }
      .l15 { animation-delay: 0.75s; }
      .l16 { animation-delay: 0.80s; }
      .l17 { animation-delay: 0.85s; }
      .l18 { animation-delay: 0.90s; }
      .l19 { animation-delay: 0.95s; }
      .l20 { animation-delay: 1.00s; }
      .l21 { animation-delay: 1.05s; }
      .l22 { animation-delay: 1.10s; }
      .l23 { animation-delay: 1.15s; }
      .l24 { animation-delay: 1.20s; }
      .l25 { animation-delay: 1.25s; }
      .l26 { animation-delay: 1.30s; }
      .l27 { animation-delay: 1.35s; }
      .l28 { animation-delay: 1.40s; }
      .l29 { animation-delay: 1.45s; }
      .l30 { animation-delay: 1.50s; }
      .l31 { animation-delay: 1.55s; }
      .l32 { animation-delay: 1.60s; }
      .l33 { animation-delay: 1.65s; }
      .l34 { animation-delay: 1.70s; }
      .l35 { animation-delay: 1.75s; }
      .l36 { animation-delay: 1.80s; }
      .l37 { animation-delay: 1.85s; }
      .l38 { animation-delay: 1.90s; }
      .l39 { animation-delay: 1.95s; }
      .l40 { animation-delay: 2.00s; }
      .l41 { animation-delay: 2.05s; }
      .l42 { animation-delay: 2.10s; }
      .l43 { animation-delay: 2.15s; }
      .l44 { animation-delay: 2.20s; }
      .l45 { animation-delay: 2.25s; }
      .l46 { animation-delay: 2.30s; }
      .l47 { animation-delay: 2.35s; }
      .l48 { animation-delay: 2.40s; }
      .l49 { animation-delay: 2.45s; }
      .l50 { animation-delay: 2.50s; }
      .l51 { animation-delay: 2.55s; }
      .l52 { animation-delay: 2.60s; }
      .l53 { animation-delay: 2.65s; }
    </style>
  </defs>

  <!-- Background Card -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="2.5" />

  <!-- Twinkling Sparkles / Glitters -->
  <path class="star" style="animation-delay: 0.2s;" d="M120,40 L123,47 L130,50 L123,53 L120,60 L117,53 L110,50 L117,47 Z" />
  <path class="star" style="animation-delay: 0.8s;" d="M720,80 L722,84 L727,86 L722,88 L720,92 L718,88 L713,86 L718,84 Z" />
  <path class="star" style="animation-delay: 1.4s;" d="M760,620 L762,624 L767,626 L762,628 L760,632 L758,628 L753,626 L758,624 Z" />
  <path class="star" style="animation-delay: 2.0s;" d="M80,980 L82,984 L87,986 L82,988 L80,992 L78,988 L73,986 L78,984 Z" />
  <circle class="star" style="animation-delay: 0.5s;" cx="250" cy="60" r="2.5" />
  <circle class="star" style="animation-delay: 1.1s;" cx="780" cy="340" r="2" />
  <circle class="star" style="animation-delay: 1.7s;" cx="60" cy="480" r="3" />
  <circle class="star" style="animation-delay: 2.3s;" cx="140" cy="850" r="1.5" />

  <!-- Mac Window Chrome UI Controls -->
  <g transform="translate(25, 20)">
    <circle cx="0" cy="0" r="6" fill="#FF5F56" />
    <circle cx="20" cy="0" r="6" fill="#FFBD2E" />
    <circle cx="40" cy="0" r="6" fill="#27C93F" />
    <text x="75" y="5" font-size="12" fill="#9CA3AF" font-weight="bold">developer.ts</text>
  </g>

  <!-- Glowing Icon Badge -->
  <g transform="translate(780, 20)">
    <circle cx="10" cy="10" r="18" fill="#1E1B4B" stroke="#6AD3F7" stroke-width="1.5" style="animation: pulse-glow 2s infinite ease-in-out;" />
    <path d="M4,10 L8,6 L12,10 L10,10 L10,14 L6,14 L6,10 Z" fill="#6AD3F7" transform="translate(5, 5) scale(0.8)" />
  </g>

  <!-- Code Block Section with Precise Indentation Coordinates (x offset) -->
  <g transform="translate(20, 60)">
    <!-- const jashwanth = { -->
    <text class="code-line l1" x="25" y="30">
      <tspan class="keyword">const</tspan> <tspan class="neon-text">jashwanth</tspan> = <tspan class="bracket">{</tspan>
    </text>

    <!-- name: "Marisetty Jashwanth", -->
    <text class="code-line l2" x="55" y="52">
      <tspan fill="#9CA3AF">name:</tspan> <tspan class="string">"Marisetty Jashwanth"</tspan>,
    </text>

    <!-- college: "IIIT Jabalpur — B.Tech CSE (2022–Present)", -->
    <text class="code-line l3" x="55" y="74">
      <tspan fill="#9CA3AF">college:</tspan> <tspan class="string">"IIIT Jabalpur — B.Tech CSE (2022–Present)"</tspan>,
    </text>

    <!-- role: "Backend Developer", -->
    <text class="code-line l4" x="55" y="96">
      <tspan fill="#9CA3AF">role:</tspan> <tspan class="string">"Backend Developer"</tspan>,
    </text>

    <!-- location: "Jabalpur, India 🇮🇳", -->
    <text class="code-line l5" x="55" y="118">
      <tspan fill="#9CA3AF">location:</tspan> <tspan class="string">"Jabalpur, India 🇮🇳"</tspan>,
    </text>

    <!-- currentlyBuilding: [ -->
    <text class="code-line l6" x="55" y="140">
      <tspan class="property">currentlyBuilding</tspan>: <tspan class="bracket">[</tspan>
    </text>

    <!-- "🧱 Formula Builder..." -->
    <text class="code-line l7" x="85" y="162">
      <tspan class="string">"🧱 Formula Builder — Full-stack form engine with AI spam detection"</tspan>,
    </text>

    <!-- "🚛 Smart Truck..." -->
    <text class="code-line l8" x="85" y="184">
      <tspan class="string">"🚛 Smart Truck — K-means clustering for last-mile logistics"</tspan>,
    </text>

    <!-- "📦 Bhandara App..." -->
    <text class="code-line l9" x="85" y="206">
      <tspan class="string">"📦 Bhandara App — Hyperlocal food-event platform (Play Store ✅)"</tspan>
    </text>

    <!-- ], -->
    <text class="code-line l10" x="55" y="228">
      <tspan class="bracket">],</tspan>
    </text>

    <!-- techStack: { -->
    <text class="code-line l11" x="55" y="250">
      <tspan class="property">techStack</tspan>: <tspan class="bracket">{</tspan>
    </text>

    <!-- languages: [...] -->
    <text class="code-line l12" x="85" y="272">
      <tspan fill="#9CA3AF">languages:</tspan> <tspan class="bracket">[</tspan><tspan class="string">"JavaScript"</tspan>, <tspan class="string">"TypeScript"</tspan>, <tspan class="string">"C++"</tspan><tspan class="bracket">]</tspan>,
    </text>

    <!-- frontend: [ -->
    <text class="code-line l13" x="85" y="294">
      <tspan fill="#9CA3AF">frontend:</tspan> <tspan class="bracket">[</tspan>
    </text>

    <!-- React.js, HTML, CSS, Tailwind CSS -->
    <text class="code-line l14" x="115" y="316"><tspan class="string">"React.js"</tspan>,</text>
    <text class="code-line l15" x="115" y="338"><tspan class="string">"HTML"</tspan>,</text>
    <text class="code-line l16" x="115" y="360"><tspan class="string">"CSS"</tspan>,</text>
    <text class="code-line l17" x="115" y="382"><tspan class="string">"Tailwind CSS"</tspan></text>

    <!-- ], -->
    <text class="code-line l18" x="85" y="404">
      <tspan class="bracket">],</tspan>
    </text>

    <!-- backend: [ -->
    <text class="code-line l19" x="85" y="426">
      <tspan fill="#9CA3AF">backend:</tspan> <tspan class="bracket">[</tspan>
    </text>

    <!-- Node.js, Express.js, RESTful APIs -->
    <text class="code-line l20" x="115" y="448"><tspan class="string">"Node.js"</tspan>,</text>
    <text class="code-line l21" x="115" y="470"><tspan class="string">"Express.js"</tspan>,</text>
    <text class="code-line l22" x="115" y="492"><tspan class="string">"RESTful APIs"</tspan></text>

    <!-- ], -->
    <text class="code-line l23" x="85" y="514">
      <tspan class="bracket">],</tspan>
    </text>

    <!-- databases: [ -->
    <text class="code-line l24" x="85" y="536">
      <tspan fill="#9CA3AF">databases:</tspan> <tspan class="bracket">[</tspan>
    </text>

    <!-- PostgreSQL, MongoDB, MySQL -->
    <text class="code-line l25" x="115" y="558"><tspan class="string">"PostgreSQL"</tspan>,</text>
    <text class="code-line l26" x="115" y="580"><tspan class="string">"MongoDB"</tspan>,</text>
    <text class="code-line l27" x="115" y="602"><tspan class="string">"MySQL"</tspan></text>

    <!-- ], -->
    <text class="code-line l28" x="85" y="624">
      <tspan class="bracket">],</tspan>
    </text>

    <!-- cache_and_messaging: [ -->
    <text class="code-line l29" x="85" y="646">
      <tspan fill="#9CA3AF">cache_and_messaging:</tspan> <tspan class="bracket">[</tspan>
    </text>

    <!-- Redis, RabbitMQ -->
    <text class="code-line l30" x="115" y="668"><tspan class="string">"Redis"</tspan>,</text>
    <text class="code-line l31" x="115" y="690"><tspan class="string">"RabbitMQ"</tspan></text>

    <!-- ], -->
    <text class="code-line l32" x="85" y="712">
      <tspan class="bracket">],</tspan>
    </text>

    <!-- devOps_and_tools: [ -->
    <text class="code-line l33" x="85" y="734">
      <tspan fill="#9CA3AF">devOps_and_tools:</tspan> <tspan class="bracket">[</tspan>
    </text>

    <!-- Docker, Git, Firebase -->
    <text class="code-line l34" x="115" y="756"><tspan class="string">"Docker"</tspan>,</text>
    <text class="code-line l35" x="115" y="778"><tspan class="string">"Git"</tspan>,</text>
    <text class="code-line l36" x="115" y="800"><tspan class="string">"Firebase"</tspan></text>

    <!-- ], -->
    <text class="code-line l37" x="85" y="822">
      <tspan class="bracket">],</tspan>
    </text>

    <!-- cloud_and_apis: [ -->
    <text class="code-line l38" x="85" y="844">
      <tspan fill="#9CA3AF">cloud_and_apis:</tspan> <tspan class="bracket">[</tspan>
    </text>

    <!-- Firebase FCM, Google Maps API -->
    <text class="code-line l39" x="115" y="866"><tspan class="string">"Firebase FCM"</tspan>,</text>
    <text class="code-line l40" x="115" y="888"><tspan class="string">"Google Maps API"</tspan></text>

    <!-- ], -->
    <text class="code-line l41" x="85" y="910">
      <tspan class="bracket">],</tspan>
    </text>

    <!-- ai_ml: [ -->
    <text class="code-line l42" x="85" y="932">
      <tspan fill="#9CA3AF">ai_ml:</tspan> <tspan class="bracket">[</tspan>
    </text>

    <!-- HuggingFace Toxic-BERT -->
    <text class="code-line l43" x="115" y="954"><tspan class="string">"HuggingFace Toxic-BERT"</tspan></text>

    <!-- ] -->
    <text class="code-line l44" x="85" y="976">
      <tspan class="bracket">]</tspan>
    </text>

    <!-- }, -->
    <text class="code-line l45" x="55" y="998">
      <tspan class="bracket">},</tspan>
    </text>

    <!-- achievements: { -->
    <text class="code-line l46" x="55" y="1020">
      <tspan class="property">achievements</tspan>: <tspan class="bracket">{</tspan>
    </text>

    <!-- jee: "98.6 Percentile..." -->
    <text class="code-line l47" x="85" y="1042">
      <tspan fill="#9CA3AF">jee:</tspan> <tspan class="string">"98.6 Percentile — JEE Main 2022 (Top 1.4%)"</tspan>,
    </text>

    <!-- leetcode: "Rating 1833..." -->
    <text class="code-line l48" x="85" y="1064">
      <tspan fill="#9CA3AF">leetcode:</tspan> <tspan class="string">"Rating 1833 | Rank 767 in Weekly 482"</tspan>,
    </text>

    <!-- codechef: "3⭐ | Rating 1671" -->
    <text class="code-line l49" x="85" y="1086">
      <tspan fill="#9CA3AF">codechef:</tspan> <tspan class="string">"3⭐ | Rating 1671"</tspan>,
    </text>

    <!-- codeforces: "Specialist | Rating 1423" -->
    <text class="code-line l50" x="85" y="1108">
      <tspan fill="#9CA3AF">codeforces:</tspan> <tspan class="string">"Specialist | Rating 1423"</tspan>
    </text>

    <!-- }, -->
    <text class="code-line l51" x="55" y="1130">
      <tspan class="bracket">},</tspan>
    </text>

    <!-- funFact: "I shipped..." -->
    <text class="code-line l52" x="55" y="1152">
      <tspan class="property">funFact</tspan>: <tspan class="string">"I shipped a production-ready form builder from a 36-hour hackathon MVP 🏆"</tspan>
    </text>

    <!-- }; -->
    <text class="code-line l53" x="25" y="1174">
      <tspan class="bracket">};</tspan>
    </text>
  </g>
</svg>
